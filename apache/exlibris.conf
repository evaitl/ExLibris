# Path-based ExLibris on the default Apache site (no separate vhost).
#
# Serves the library at http://localhost/exlibris/
#
# Install:
#   ./scripts/setup-data-dir.sh
#   sudo cp apache/exlibris.conf /etc/apache2/conf-available/exlibris.conf
#   sudo a2enconf exlibris
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

Define EXLIBRIS_ROOT /home/evaitl/programming/ExLibris
Define EXLIBRIS_PATH /exlibris

Alias ${EXLIBRIS_PATH}/ ${EXLIBRIS_ROOT}/web/

<Directory ${EXLIBRIS_ROOT}/web>
    Require all granted
</Directory>

ScriptAlias ${EXLIBRIS_PATH}/cgi-bin/ ${EXLIBRIS_ROOT}/web/cgi-bin/

<Directory ${EXLIBRIS_ROOT}/web/cgi-bin>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted

    SetEnv EXLIBRIS_DATABASE_PATH ${EXLIBRIS_ROOT}/data/library.db
    SetEnv EXLIBRIS_CGI_PREFIX ${EXLIBRIS_PATH}/cgi-bin/
    SetEnv EXLIBRIS_STATIC_URL ${EXLIBRIS_PATH}/static/style.css
</Directory>

RedirectMatch ^/exlibris/?$ /exlibris/cgi-bin/index.py
